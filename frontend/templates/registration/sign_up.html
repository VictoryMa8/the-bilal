{% extends "base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="flex flex-col items-center">
    <h2 class="text-2xl mt-4">Sign Up</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_table }}
        <button class="text-2xl bg-blue-600 text-white px-4 border-blue-900 border-2 mt-2 hover:bg-blue-300 hover:text-blue-900 hover:cursor-pointer w-40 text-center" type="submit">Sign Up</button>
    </form>
    {% endblock %}

    {% if messages %}
    <div>
        {% for message in messages %}
        <h1 class="text-2xl text-center font-bold">{{ message }}</h1>
        {% endfor %}
    </div>

</div>
{% endif %}
