{% extends 'base.html' %}

{% block content %}

{% if user.is_authenticated %}
<div class="flex flex-col items-center justify-center">
    <h1 class="text-2xl text-center mt-4">Hello, {{ user.username }}</h1>

    <form action="{% url 'logout' %}" method="post">
    {% csrf_token %}
        <button class="mt-2 text-2xl btn" type="submit">Log Out</button>
    </form>
</div>
{% else %}

{% include 'registration/login.html' %}

{% endif %}

{% endblock %}
